<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>QUOTES</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="quote-box">
      <div class="box-text">
         <h1>Quote Generator</h1>   
         <h2 id="clicknextquote">Click "next quote" to fuel your mind with motivational quotes.</h2>
         <button onclick="nextquote()" >next quote</button>
         <button onclick="previousquote()">previous quote</button>
         <button onclick="copyQuote()">Copy Quote</button>
      </div>
       <img id="quote-img" src="images/default.jpg" alt="quote image" style="width:300px; height:auto; border-radius:10px;">
   </div>

    <script src="script.js"></script>
    
</body>
</html>
